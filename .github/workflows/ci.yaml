name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    name: Run pre-commit to check formatting and linting
    if: false
    permissions:
      contents: read
    uses: ./.github/workflows/pre-commit.yaml
  test-android:
    name: Test for Android
    if: false
    permissions:
      contents: read
    uses: ./.github/workflows/test-android.yaml
  test-ios:
    name: Test for iOS
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/test-ios.yaml
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      GOOGLE_APP_ID_IOS: ${{ secrets.GOOGLE_APP_ID_IOS_STAGING }}
  build-android:
    name: Build for Android
    if: false
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/build-android.yaml
    with:
      build-type: "Debug"
      flavor: "Staging"
      sentry-environment: "debug"
      upload-artifacts: false
    secrets:
      FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      GOOGLE_APP_ID_ANDROID: ${{ secrets.GOOGLE_APP_ID_ANDROID_STAGING }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN_ANDROID: ${{ secrets.SENTRY_DSN_ANDROID }}
  build-ios:
    name: Build for iOS
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/build-ios.yaml
    with:
      scheme: "Staging"
      sentry-environment: "staging"
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      GOOGLE_APP_ID_IOS: ${{ secrets.GOOGLE_APP_ID_IOS_STAGING }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
  deploy-ios:
    name: Upload to App Store
    needs:
      - build-ios
      - test-ios
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-ios.yaml
    with:
      scheme: Staging
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
